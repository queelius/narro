# GGUF chat-format hints: pattern -> llama-cpp-python chat_format string.
#
# Why: llama-cpp-python's built-in chat handlers know how to parse a
# model's native tool-call output back into OpenAI-shape `tool_calls`
# fields. Without the right `chat_format`, tool calls leak as raw
# text in `content` (e.g. `<tool_call>...</tool_call>` for Qwen),
# breaking OpenAI client compatibility.
#
# This file is a curated lookup table, not an exhaustive registry.
# Pattern matching is case-insensitive substring against the
# lowercased HF repo id. First match wins, so put more specific
# patterns before more general ones.
#
# Available `chat_format` values (llama-cpp-python's built-in handlers):
#   chatml-function-calling, functionary-v2, functionary-v1, llama-3,
#   chatml, qwen, mistral-instruct, hermes-3, gemma, ...
# See: https://llama-cpp-python.readthedocs.io/en/latest/api-reference/
#
# Adding a new entry:
#   - test the model with tool calling locally
#   - pick the chat_format that produces structured tool_calls
#   - add a row here, more-specific patterns above more-general ones
#   - if uncertain about tool support, set supports_tools: false (will warn)

- pattern: qwen3
  chat_format: chatml-function-calling
  supports_tools: true

- pattern: qwen2.5
  chat_format: chatml-function-calling
  supports_tools: true

- pattern: hermes-3
  chat_format: chatml-function-calling
  supports_tools: true

- pattern: llama-3.1
  chat_format: llama-3
  supports_tools: true

- pattern: llama-3.2
  chat_format: llama-3
  supports_tools: true

- pattern: llama-3.3
  chat_format: llama-3
  supports_tools: true

- pattern: mistral-nemo
  chat_format: mistral-instruct
  supports_tools: true

- pattern: functionary
  chat_format: functionary-v2
  supports_tools: true
